<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrashBat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    h1 { font-size: 1.8rem; letter-spacing: 0.05em; color: #fff; }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    select, button {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid #333;
      font-size: 0.95rem;
      cursor: pointer;
    }

    select {
      background: #1e1e1e;
      color: #e0e0e0;
    }

    button {
      background: #2a2a2a;
      color: #e0e0e0;
      transition: background 0.15s;
    }

    button:hover { background: #3a3a3a; }

    button.primary {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
      font-weight: 600;
    }

    button.primary:hover { background: #2563eb; }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 180px);
      gap: 1rem;
    }

    .card {
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      background: #1a1a1a;
    }

    .card:hover { border-color: #555; transform: scale(1.02); }
    .card.selected { border-color: #3b82f6; }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .card .label {
      text-align: center;
      padding: 0.4rem;
      font-size: 0.8rem;
      color: #aaa;
      text-transform: capitalize;
    }

    .result {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .result-heading {
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .result-heading .correct { color: #22c55e; }
    .result-heading .wrong   { color: #ef4444; }

    .bar-row {
      display: grid;
      grid-template-columns: 90px 1fr 52px;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .bar-row .cls-name {
      text-align: right;
      text-transform: capitalize;
      color: #aaa;
    }

    .bar-row.predicted .cls-name { color: #fff; font-weight: 600; }

    .bar-track {
      background: #2a2a2a;
      border-radius: 4px;
      height: 18px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: #3b82f6;
      transition: width 0.3s ease;
    }

    .bar-row.predicted .bar-fill { background: #22c55e; }
    .bar-row.wrong-pred .bar-fill { background: #ef4444; }

    .bar-pct { color: #aaa; font-size: 0.8rem; }
    .bar-row.predicted .bar-pct { color: #fff; }

    .status { font-size: 0.85rem; color: #888; min-height: 1.2rem; }

    .params {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1rem;
      justify-content: center;
      font-size: 0.8rem;
      color: #888;
      min-height: 1.2rem;
    }

    .param-item { white-space: nowrap; }
    .param-item .param-name { color: #666; }
    .param-item .param-value { color: #aaa; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h1>TrashBat</h1>

  <div class="controls">
    <label for="model-select">Model:</label>
    <select id="model-select"></select>
    <button id="shuffle-btn">Shuffle images</button>
    <button id="categorize-btn" class="primary" disabled>Categorize</button>
  </div>

  <div class="params" id="model-params"></div>

  <p class="status" id="status"></p>

  <div class="grid" id="image-grid"></div>

  <div class="result" id="result"></div>

  <script>
    const modelSelect   = document.getElementById('model-select');
    const shuffleBtn    = document.getElementById('shuffle-btn');
    const categorizeBtn = document.getElementById('categorize-btn');
    const grid          = document.getElementById('image-grid');
    const resultEl      = document.getElementById('result');
    const statusEl      = document.getElementById('status');
    const paramsEl      = document.getElementById('model-params');

    let selectedImage = null; // e.g. "glass/glass42.jpg"

    async function loadModelParams(name) {
      paramsEl.innerHTML = '';
      try {
        const res = await fetch(`/api/models/${name}/params`);
        if (!res.ok) return;
        const { params } = await res.json();
        for (const [key, val] of Object.entries(params)) {
          const span = document.createElement('span');
          span.className = 'param-item';
          span.innerHTML = `<span class="param-name">${key}:</span> <span class="param-value">${val}</span>`;
          paramsEl.appendChild(span);
        }
      } catch (_) {}
    }

    async function loadModels() {
      const res = await fetch('/api/models');
      const { models } = await res.json();
      modelSelect.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
      if (models.length) loadModelParams(models[0]);
    }

    async function loadImages() {
      selectedImage = null;
      categorizeBtn.disabled = true;
      resultEl.innerHTML = '';
      grid.innerHTML = '';

      const res = await fetch('/api/random-images');
      const { images } = await res.json();

      for (const [cls, path] of Object.entries(images)) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.path = path;
        card.dataset.cls = cls;

        const img = document.createElement('img');
        img.src = `/dataset/${path}`;
        img.alt = cls;

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = cls;

        card.appendChild(img);
        card.appendChild(label);
        card.addEventListener('click', () => selectCard(card));
        grid.appendChild(card);
      }
    }

    function selectCard(card) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedImage = card.dataset.path;
      categorizeBtn.disabled = false;
      resultEl.innerHTML = '';
    }

    async function categorize() {
      if (!selectedImage) return;

      const model = modelSelect.value;
      categorizeBtn.disabled = true;
      statusEl.textContent = 'Running\u2026';
      resultEl.innerHTML = '';

      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, image: selectedImage }),
        });

        if (!res.ok) {
          const err = await res.json();
          statusEl.textContent = err.detail || 'Error';
          return;
        }

        const { prediction, probabilities } = await res.json();
        const actual = selectedImage.split('/')[0];
        const correct = prediction === actual;

        statusEl.textContent = `Actual: ${actual}`;

        const heading = document.createElement('div');
        heading.className = 'result-heading';
        heading.innerHTML = `Prediction: <span class="${correct ? 'correct' : 'wrong'}">${prediction}</span>`;
        resultEl.appendChild(heading);

        // Sort by probability descending
        const sorted = Object.entries(probabilities).sort((a, b) => b[1] - a[1]);
        for (const [cls, prob] of sorted) {
          const isPredicted = cls === prediction;
          const isActual = cls === actual;
          const row = document.createElement('div');
          row.className = 'bar-row' + (isPredicted ? (correct ? ' predicted' : ' wrong-pred') : '');

          const pct = (prob * 100).toFixed(1);
          row.innerHTML = `
            <span class="cls-name">${cls}${isActual ? ' ✓' : ''}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span class="bar-pct">${pct}%</span>
          `;
          resultEl.appendChild(row);
        }
      } finally {
        categorizeBtn.disabled = false;
      }
    }

    modelSelect.addEventListener('change', () => loadModelParams(modelSelect.value));
    shuffleBtn.addEventListener('click', loadImages);
    categorizeBtn.addEventListener('click', categorize);

    // Init
    loadModels().then(loadImages);
  </script>
</body>
</html>
