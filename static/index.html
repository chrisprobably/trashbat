<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrashBat</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>TrashBat</h1>

  <div class="controls">
    <label for="model-select">Model:</label>
    <select id="model-select"></select>
    <button id="shuffle-btn">Shuffle images</button>
    <button id="confusion-btn">View confusion matrix</button>
    <button id="categorize-btn" class="primary" disabled>Categorize</button>
  </div>

  <div class="modal" id="confusion-modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <button class="modal-close" data-close aria-label="Close">&times;</button>
      <img id="confusion-img" alt="Confusion matrix">
    </div>
  </div>

  <div class="params" id="model-params"></div>

  <p class="status" id="status"></p>

  <div class="grid" id="image-grid"></div>

  <div class="result" id="result"></div>

  <script>
    const modelSelect   = document.getElementById('model-select');
    const shuffleBtn    = document.getElementById('shuffle-btn');
    const categorizeBtn = document.getElementById('categorize-btn');
    const grid          = document.getElementById('image-grid');
    const resultEl      = document.getElementById('result');
    const statusEl      = document.getElementById('status');
    const paramsEl      = document.getElementById('model-params');

    let selectedImage = null; // e.g. "glass/glass42.jpg"

    async function loadModelParams(name) {
      paramsEl.innerHTML = '';
      try {
        const res = await fetch(`/api/models/${name}/params`);
        if (!res.ok) return;
        const { params } = await res.json();
        for (const [key, val] of Object.entries(params)) {
          const span = document.createElement('span');
          span.className = 'param-item';
          span.innerHTML = `<span class="param-name">${key}:</span> <span class="param-value">${val}</span>`;
          paramsEl.appendChild(span);
        }
      } catch (_) {}
    }

    async function loadModels() {
      const res = await fetch('/api/models');
      const { models } = await res.json();
      modelSelect.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
      if (models.length) loadModelParams(models[0]);
    }

    async function loadImages() {
      selectedImage = null;
      categorizeBtn.disabled = true;
      resultEl.innerHTML = '';
      grid.innerHTML = '';

      const res = await fetch('/api/random-images');
      const { images } = await res.json();

      for (const [cls, path] of Object.entries(images)) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.path = path;
        card.dataset.cls = cls;

        const img = document.createElement('img');
        img.src = `/dataset/${path}`;
        img.alt = cls;

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = cls;

        card.appendChild(img);
        card.appendChild(label);
        card.addEventListener('click', () => selectCard(card));
        grid.appendChild(card);
      }
    }

    function selectCard(card) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedImage = card.dataset.path;
      categorizeBtn.disabled = false;
      resultEl.innerHTML = '';
    }

    async function categorize() {
      if (!selectedImage) return;

      const model = modelSelect.value;
      categorizeBtn.disabled = true;
      statusEl.textContent = 'Running\u2026';
      resultEl.innerHTML = '';

      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, image: selectedImage }),
        });

        if (!res.ok) {
          const err = await res.json();
          statusEl.textContent = err.detail || 'Error';
          return;
        }

        const { prediction, probabilities } = await res.json();
        const actual = selectedImage.split('/')[0];
        const correct = prediction === actual;

        statusEl.textContent = `Actual: ${actual}`;

        const heading = document.createElement('div');
        heading.className = 'result-heading';
        heading.innerHTML = `Prediction: <span class="${correct ? 'correct' : 'wrong'}">${prediction}</span>`;
        resultEl.appendChild(heading);

        // Sort by probability descending
        const sorted = Object.entries(probabilities).sort((a, b) => b[1] - a[1]);
        for (const [cls, prob] of sorted) {
          const isPredicted = cls === prediction;
          const isActual = cls === actual;
          const row = document.createElement('div');
          row.className = 'bar-row' + (isPredicted ? (correct ? ' predicted' : ' wrong-pred') : '');

          const pct = (prob * 100).toFixed(1);
          row.innerHTML = `
            <span class="cls-name">${cls}${isActual ? ' ✓' : ''}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span class="bar-pct">${pct}%</span>
          `;
          resultEl.appendChild(row);
        }
      } finally {
        categorizeBtn.disabled = false;
      }
    }

    const confusionBtn   = document.getElementById('confusion-btn');
    const confusionModal = document.getElementById('confusion-modal');
    const confusionImg   = document.getElementById('confusion-img');

    async function showConfusionMatrix() {
      const model = modelSelect.value;
      if (!model) return;
      const res = await fetch(`/api/models/${model}/confusion`);
      if (!res.ok) {
        statusEl.textContent = 'No confusion matrix available. Retrain the model.';
        return;
      }
      const blob = await res.blob();
      confusionImg.src = URL.createObjectURL(blob);
      confusionModal.hidden = false;
    }

    function closeConfusionModal() {
      confusionModal.hidden = true;
      if (confusionImg.src) URL.revokeObjectURL(confusionImg.src);
      confusionImg.src = '';
    }

    confusionBtn.addEventListener('click', showConfusionMatrix);
    confusionModal.addEventListener('click', (e) => {
      if (e.target.hasAttribute('data-close')) closeConfusionModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !confusionModal.hidden) closeConfusionModal();
    });

    modelSelect.addEventListener('change', () => loadModelParams(modelSelect.value));
    shuffleBtn.addEventListener('click', loadImages);
    categorizeBtn.addEventListener('click', categorize);

    // Init
    loadModels().then(loadImages);
  </script>
</body>
</html>
